---
name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Build, package, and sign .dmg
        id: build
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: scripts/build-and-sign-dmg.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.build.outputs.short_version }}" \
            "${{ steps.build.outputs.dmg_path }}" \
            --title "Version ${{ steps.build.outputs.short_version }}" \
            --generate-notes

      - name: Update appcast.xml on main
        env:
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.build.outputs.short_version }}/Selene-${{ steps.build.outputs.short_version }}.dmg
        run: |
          git fetch origin main
          git checkout main

          scripts/update-appcast.sh \
            "${{ steps.build.outputs.short_version }}" \
            "${{ steps.build.outputs.build_number }}" \
            "${{ steps.build.outputs.dmg_length }}" \
            "${{ steps.build.outputs.ed_signature }}" \
            "$DOWNLOAD_URL"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Appcast for v${{ steps.build.outputs.short_version }}"
          git push origin main
