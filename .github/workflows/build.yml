---
name: Build
permissions:
  contents: read

# This builds the legacy Qt client in app/ (via scripts/generate-dmg.sh ->
# qmake moonlight-qt.pro), not the native Swift app in Selene/ - so it should
# only run when something that build actually depends on changes.
on:
  push:
    paths:
      - "app/**"
      - "moonlight-common-c/**"
      - "h264bitstream/**"
      - "qmdnsengine/**"
      - "globaldefs.pri"
      - "moonlight-qt.pro"
      - "setup-deps.py"
      - "scripts/generate-dmg.sh"
      - ".github/workflows/build.yml"
      - ".github/workflows/build-macos.yml"
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "moonlight-common-c/**"
      - "h264bitstream/**"
      - "qmdnsengine/**"
      - "globaldefs.pri"
      - "moonlight-qt.pro"
      - "setup-deps.py"
      - "scripts/generate-dmg.sh"
      - ".github/workflows/build.yml"
      - ".github/workflows/build-macos.yml"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ci_version: ${{ steps.set-ci-version.outputs.ci_version }}
    steps:
      - name: Set CI version
        id: set-ci-version
        shell: bash
        run: |
          CI_VERSION=`echo ${GITHUB_SHA} | cut -c1-6`
          echo "ci_version=${CI_VERSION}" >> "${GITHUB_OUTPUT}"

  build-macos:
    needs: setup
    uses: ./.github/workflows/build-macos.yml
    with:
      ci_version: ${{ needs.setup.outputs.ci_version }}
